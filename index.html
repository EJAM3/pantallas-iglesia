<!DOCTYPE html>
<!-- v3.0 fixed -->
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Pantallas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #eee; font-family: Arial, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 30px 16px; }
.container { background: #16213e; border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 700px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
h1 { text-align: center; font-size: 1.8em; color: #e94560; margin-bottom: 6px; }
.subtitle { text-align: center; color: #aaa; font-size: 0.9em; margin-bottom: 28px; }
label { display: block; font-size: 0.78em; letter-spacing: 1px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; }
input[type=text], textarea { width: 100%; background: #0f3460; border: none; border-radius: 8px; color: #fff; padding: 12px 14px; font-size: 1em; margin-bottom: 20px; outline: none; }
textarea { height: 200px; resize: vertical; font-family: monospace; }
.opt-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
.opt-grid-5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 20px; }
.opt-btn { padding: 12px 6px; border: 2px solid #0f3460; border-radius: 10px; background: #0f3460; color: #aaa; cursor: pointer; text-align: center; font-size: 0.95em; transition: all 0.2s; user-select: none; }
.opt-btn:hover { border-color: #e94560; color: #fff; }
.opt-btn.active { border-color: #e94560; background: #2a1040; color: #fff; }
.opt-btn .opt-name { font-weight: bold; font-size: 1.05em; display: block; }
.opt-btn .opt-sub { font-size: 0.7em; color: #888; display: block; margin-top: 2px; }
.opt-btn.active .opt-sub { color: #e94560; }
.controls-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.control-box { background: #0f3460; border-radius: 10px; padding: 14px 16px; }
.control-box label { margin-bottom: 10px; }
.slider-row { display: flex; align-items: center; gap: 10px; }
input[type=range] { flex: 1; -webkit-appearance: none; height: 6px; background: #1a4a80; border-radius: 3px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #e94560; cursor: pointer; }
.size-val { color: #e94560; font-weight: bold; font-size: 1em; min-width: 45px; text-align: right; }
.color-row { display: flex; align-items: center; gap: 12px; }
input[type=color] { width: 44px; height: 44px; border: none; border-radius: 8px; background: none; cursor: pointer; padding: 0; }
.color-label { font-size: 0.85em; color: #ccc; }
.btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: #e94560; color: #fff; }
#status { margin-top: 16px; padding: 12px 16px; border-radius: 8px; display: none; font-size: 0.95em; }
.status-ok { background: #1b5e20; color: #a5d6a7; }
.status-err { background: #b71c1c; color: #ffcdd2; }
.status-info { background: #0d47a1; color: #bbdefb; }
#preview { margin-top: 24px; display: none; }
#preview h3 { color: #e94560; margin-bottom: 12px; font-size: 1em; }
.preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 8px; }
.preview-item { position: relative; }
.preview-item canvas { width: 100%; border-radius: 4px; border: 1px solid #333; display: block; }
.preview-item .slide-num { position: absolute; top: 4px; left: 6px; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.7em; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>&#127926; Generador de Pantallas</h1>
  <p class="subtitle">PNGs con canal alfa para Resolume</p>
  <label>Nombre de la cancion (opcional)</label>
  <input type="text" id="titulo" placeholder="Ej: Santo, Santo, Santo...">
  <label>Resolucion de exportacion</label>
  <div class="opt-grid-3">
    <div class="opt-btn active" onclick="setRes(this,1920,1080)"><span class="opt-name">Full HD</span><span class="opt-sub">1920 x 1080</span></div>
    <div class="opt-btn" onclick="setRes(this,2560,1440)"><span class="opt-name">2K</span><span class="opt-sub">2560 x 1440</span></div>
    <div class="opt-btn" onclick="setRes(this,3840,2160)"><span class="opt-name">4K UHD</span><span class="opt-sub">3840 x 2160</span></div>
  </div>
  <label>Lineas por pantalla</label>
  <div class="opt-grid-5">
    <div class="opt-btn" onclick="setLines(this,0)"><span class="opt-name">&#10022; Original</span><span class="opt-sub">segun estrofa</span></div>
    <div class="opt-btn" onclick="setLines(this,1)"><span class="opt-name">1</span><span class="opt-sub">linea</span></div>
    <div class="opt-btn active" onclick="setLines(this,2)"><span class="opt-name">2</span><span class="opt-sub">lineas</span></div>
    <div class="opt-btn" onclick="setLines(this,3)"><span class="opt-name">3</span><span class="opt-sub">lineas</span></div>
    <div class="opt-btn" onclick="setLines(this,4)"><span class="opt-name">4</span><span class="opt-sub">lineas</span></div>
  </div>
  <div class="controls-row">
    <div class="control-box">
      <label>Tamano de letra</label>
      <div class="slider-row">
        <input type="range" id="fontSize" min="30" max="200" value="140" oninput="document.getElementById('fontSizeVal').textContent=this.value+'pt'">
        <span class="size-val" id="fontSizeVal">140pt</span>
      </div>
    </div>
    <div class="control-box">
      <label>Color palabra clave</label>
      <div class="color-row">
        <input type="color" id="keyColor" value="#BF360C" oninput="document.getElementById('colorHex').textContent=this.value.toUpperCase()">
        <span class="color-label" id="colorHex">#BF360C</span>
      </div>
    </div>
  </div>
  <label>Letra de la cancion</label>
  <textarea id="letra" placeholder="Pega aqui la letra...&#10;&#10;Separa estrofas con una linea en blanco para modo Original."></textarea>
  <button class="btn btn-primary" onclick="generarPNGs()">&#9654; Generar PNGs con canal alfa (ZIP)</button>
  <div id="status"></div>
  <div id="preview"><h3 id="previewTitle">Vista previa:</h3><div class="preview-grid" id="previewGrid"></div></div>
</div>
<canvas id="hiddenCanvas" style="display:none"></canvas>
<script>
var KW = ["gracia","dios","senor","iglesia","jesus","cristo","rey","reino","padre","espiritu","santo","santa","gloria","amor","fe","salvacion","salvador","alabanza","adoracion","santidad","misericordia","eterno","eterna","majestad","omnipotente","jehova","emmanuel","cordero","luz","vida","verdad","poder"];
var RW = 1920, RH = 1080, ML = 2;

function setRes(el, w, h) {
  el.parentElement.querySelectorAll(".opt-btn").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  RW = w; RH = h;
}

function setLines(el, n) {
  el.parentElement.querySelectorAll(".opt-btn").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  ML = n;
}

function norm(t) {
  return t.normalize("NFD").replace(/\u0300-\u036f/g,"").toLowerCase();
}

function isKW(word) {
  var clean = norm(word.replace(/[^a-zA-Z\u00C0-\u024F]/g,""));
  return KW.indexOf(clean) !== -1;
}

function groupOrig(txt) {
  var groups = [];
  var stanzas = txt.split(/\n\s*\n/);
  stanzas.forEach(function(block) {
    var lines = block.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
    if (lines.length > 0) groups.push(lines);
  });
  return groups;
}

function groupFixed(txt, max) {
  var allLines = txt.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
  var groups = [], i = 0;
  while (i < allLines.length) {
    var gr = [];
    while (gr.length < max && i < allLines.length) {
      gr.push(allLines[i++]);
    }
    if (i < allLines.length && gr.length < max + 1) {
      var nextWords = allLines[i].trim().split(/\s+/).filter(Boolean);
      if (nextWords.length === 1) { gr.push(allLines[i++]); }
    }
    groups.push(gr);
  }
  if (groups.length > 1) {
    var last = groups[groups.length - 1];
    if (last.length === 1 && last[0].trim().split(/\s+/).filter(Boolean).length === 1) {
      groups[groups.length - 2].push(last[0]);
      groups.pop();
    }
  }
  return groups;
}

function drawSlide(ctx, lines, W, H, pt, keyColor) {
  ctx.clearRect(0, 0, W, H);
  var scale = W / 1920;
  var fontSize = Math.round(pt * scale);
  var lineHeight = Math.round(fontSize * 1.5);
  var outlineWidth = Math.max(2, Math.round(4 * scale));
  ctx.font = "bold " + fontSize + "px Tahoma, Arial, sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  var totalH = lines.length * lineHeight;
  var startY = (H - totalH) / 2 + lineHeight / 2;
  var marginX = Math.round(60 * scale);
  lines.forEach(function(line, i) {
    var y = startY + i * lineHeight;
    var tokens = line.split(/(\s+)/);
    var totalW = 0;
    tokens.forEach(function(tok) { totalW += ctx.measureText(tok).width; });
    var startX = (W - totalW) / 2;
    if (startX < marginX) startX = marginX;
    var x = startX;
    tokens.forEach(function(tok) {
      if (/^\s+$/.test(tok)) { x += ctx.measureText(tok).width; return; }
      var w = ctx.measureText(tok).width;
      ctx.strokeStyle = "rgba(0,0,0,0.9)";
      ctx.lineWidth = outlineWidth;
      ctx.lineJoin = "round";
      ctx.strokeText(tok, x, y);
      ctx.fillStyle = isKW(tok) ? keyColor : "#FFFFFF";
      ctx.fillText(tok, x, y);
      x += w;
    });
  });
}

async function generarPNGs() {
  var txt = document.getElementById("letra").value;
  var tit = document.getElementById("titulo").value.trim() || "cancion";
  var pt = parseInt(document.getElementById("fontSize").value);
  var kc = document.getElementById("keyColor").value;
  if (!txt.trim()) { showStatus("Por favor pega la letra de la cancion.", "err"); return; }
  var groups, modeLabel;
  if (ML === 0) { groups = groupOrig(txt); modeLabel = "Original"; }
  else { groups = groupFixed(txt, ML); modeLabel = ML + " lineas"; }
  var resLabel = RW === 3840 ? "4K" : RW === 2560 ? "2K" : "1080p";
  showStatus("Procesando " + groups.length + " slides (" + resLabel + " | " + pt + "pt | " + modeLabel + ")...", "info");
  var previewGrid = document.getElementById("previewGrid");
  previewGrid.innerHTML = "";
  document.getElementById("previewTitle").textContent = "Vista previa (" + groups.length + " slides | " + resLabel + " | " + pt + "pt | " + modeLabel + "):";
  document.getElementById("preview").style.display = "block";
  var mc = document.getElementById("hiddenCanvas");
  var zip = new JSZip();
  var folder = zip.folder(tit);
  var safeName = tit.replace(/[^a-zA-Z0-9_\-]/g, "_");
  for (var i = 0; i < groups.length; i++) {
    mc.width = RW; mc.height = RH;
    var ctx = mc.getContext("2d");
    drawSlide(ctx, groups[i], RW, RH, pt, kc);
    var dataURL = mc.toDataURL("image/png");
    var base64 = dataURL.split(",")[1];
    var filename = safeName + "_" + String(i + 1).padStart(3, "0") + ".png";
    folder.file(filename, base64, { base64: true });
    var PW = 180, PH = Math.round(RH * (180 / RW));
    var pc = document.createElement("canvas");
    pc.width = PW; pc.height = PH;
    var pctx = pc.getContext("2d");
    pctx.fillStyle = "#222"; pctx.fillRect(0, 0, PW, PH);
    pctx.drawImage(mc, 0, 0, PW, PH);
    var item = document.createElement("div");
    item.className = "preview-item";
    var numLabel = document.createElement("div");
    numLabel.className = "slide-num";
    numLabel.textContent = (i + 1) + " (" + groups[i].length + "L)";
    item.appendChild(pc); item.appendChild(numLabel);
    previewGrid.appendChild(item);
    if (i % 5 === 0) await new Promise(function(r){ setTimeout(r, 0); });
  }
  showStatus("Empaquetando ZIP...", "info");
  await new Promise(function(r){ setTimeout(r, 10); });
  var blob = await zip.generateAsync({ type: "blob" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = safeName + "_" + resLabel + "_" + pt + "pt_slides.zip";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showStatus("Listo! " + groups.length + " slides | " + resLabel + " | " + pt + "pt | ZIP: " + (blob.size/1024/1024).toFixed(1) + " MB", "ok");
}

function showStatus(msg, type) {
  var el = document.getElementById("status");
  el.style.display = "block";
  el.className = type === "ok" ? "status-ok" : type === "err" ? "status-err" : "status-info";
  el.textContent = msg;
}
</script>
</body>
</html>
